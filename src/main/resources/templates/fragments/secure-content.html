<!DOCTYPE html>
<html lang="en">

<body>

    <!-- Only Authenticated Pages can load this header -->
    <!-- Sidebar -->
    <nav th:fragment="sidebar" id="sidebar" sec:authorize="isAuthenticated()">

        <!-- App Logo / Icon -->
        <div class="sidebar-header">
            <a class="navbar-brand" href="#">
                <img th:src="@{/images/icon.png}" alt="zyncky app icon"
                    class="w-25 d-inline-block align-text-top">
                <span class="align-bottom h1">Zyncky</span>
            </a>
        </div>
        <hr class="p-0 m-0">
        <!-- Sidebar | Menu -->
        <ul class="mt-3 list-unstyled">
            <!-- <h3 th:text="${#strings.contains(#httpServletRequest.requestURI,'/dashboard')}"></h3> -->
            <li class="my-2" sec:authorize="hasRole('ADMIN')"
                th:classappend="${#strings.contains(#httpServletRequest.requestURI,'dashboard')} ? 'active': ''">
                <a th:href="@{/admin/dashboard}"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
            </li>
            <li class="my-2" sec:authorize="hasRole('ADMIN')">
                <a href="#userSubMenu" data-toggle="collapse"
                    th:aria-expanded="${#strings.contains(#httpServletRequest.requestURI,'user')}"
                    class="dropdown-toggle">
                    <i class="fas fa-users-cog"></i> Users
                </a>
                <ul class="collapse list-unstyled"
                    th:classappend="${#strings.contains(#httpServletRequest.requestURI,'user')}?'show':''"
                    id="userSubMenu">
                    <li th:classappend="${#strings.contains(#httpServletRequest.requestURI,'add-user')} ? 'active': ''">
                        <a th:href="@{/admin/add-user}"><i class="fas fa-user-plus"></i> Add User</a>
                    </li>
                    <li
                        th:classappend="${#strings.contains(#httpServletRequest.requestURI,'view-users')} ? 'active': ''">
                        <a th:href="@{/admin/view-users}"><i class="fas fa-users"></i> View Users</a>
                    </li>
                </ul>
            </li>
            <li class="my-2" sec:authorize="hasRole('ADMIN')">
                <a href="#appSubMenu" data-toggle="collapse"
                    th:aria-expanded="${#strings.contains(#httpServletRequest.requestURI,'app')}"
                    class="dropdown-toggle">
                    <i class="fab fa-buffer"></i> Applications
                </a>
                <ul class="collapse list-unstyled" id="appSubMenu"
                    th:classappend="${#strings.contains(#httpServletRequest.requestURI,'app')}?'show':''">
                    <li th:classappend="${#strings.contains(#httpServletRequest.requestURI,'add-app')} ? 'active': ''">
                        <a th:href="@{/admin/add-app}"><i class="fas fa-cube"></i> Add Application</a>
                    </li>
                    <li
                        th:classappend="${#strings.contains(#httpServletRequest.requestURI,'view-apps')} ? 'active': ''">
                        <a th:href="@{/admin/view-apps}"><i class="fas fa-cubes"></i> View Applications</a>
                    </li>
                </ul>
            </li>
            <li class="my-2"
                th:classappend="${#strings.contains(#httpServletRequest.requestURI,'my-apps')} ? 'active': ''">
                <a href="#"><i class="fas fa-dice-d6"></i> My Apps</a>
            </li>
            <li class="my-2"
                th:classappend="${#strings.contains(#httpServletRequest.requestURI,'profile')} ? 'active': ''">
                <a href="#"><i class="fas fa-user-circle"></i> My Profile</a>
            </li>
            <li class="my-2"
                th:classappend="${#strings.contains(#httpServletRequest.requestURI,'about')} ? 'active': ''">
                <a href="#"><i class="fas fa-info-circle"></i> About</a>
            </li>
        </ul>
    </nav>

    <!-- Only Authenticated Pages can load this header -->
    <!-- Header -->
    <nav class="navbar navbar-expand-lg navbar-light cs-bg-light" th:fragment="header" sec:authorize="isAuthenticated()">
        <div class="container-fluid">
            <button type="button" id="sidebarCollapse" onclick="toogleMenu()" class="btn cs-btn-info text-white">
                <i class="fas fa-align-left"></i>
                <span>Menu</span>
            </button>
            <ul class="nav ml-auto flex-row">
                <li class="nav-item active">
                    <button type="button" class="btn btn-light me-1">
                        <i class="fas fa-search"></i>
                    </button>
                </li>
                <li class="nav-item">
                    <button type="button" class="btn btn-light me-1">
                        <i class="far fa-bell"></i>
                    </button>
                </li>
                <li class="nav-item">
                    <button type="button" class="btn btn-light me-1">
                        <i class="fas fa-cog"></i>
                    </button>
                </li>
                <li class="nav-item">
                    <div class="dropdown">
                        <button class="btn btn-light me-1 dropdown-toggle" type="button" id="dropdownMenuButton1"
                            data-bs-toggle="dropdown" aria-expanded="false">
                            <i class="fas fa-user-circle"></i>
                            <span class="me-3" sec:authentication="name"></span>
                        </button>
                        <ul class="dropdown-menu dropdown-menu-lg-end" aria-labelledby="dropdownMenuButton1">
                            <li><a class="dropdown-item" href="#">
                                    <i class="fas fa-user-circle"></i>
                                    <span class="mx-1">Profile</span>
                                </a></li>
                            <li><a class="dropdown-item" href="#">
                                    <i class="fas fa-cog"></i>
                                    <span class="mx-1">Settings</span>
                                </a></li>
                            <li><a class="dropdown-item" href="#">
                                    <i class="fas fa-shield-alt text-success"></i>
                                    <span class="mx-1">Security</span>
                                </a></li>
                            <li>
                                <hr class="dropdown-divider">
                            </li>
                            <li>
                                <a class="dropdown-item text-danger" th:href="@{/logout}">
                                    <i class="fas fa-sign-out-alt"></i> Logout
                                </a>
                            </li>
                        </ul>
                    </div>
                </li>
            </ul>
        </div>
    </nav>

</body>

</html>
