<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Zyncky</title>

    <head th:replace="fragments/global :: css"></head>
</head>

<body>
    <div class="cs-grid-center cs-full-height cs-bg-dark">
        <div class="card" style="min-width: 25rem;">
            <div class="card-body pt-2">
                <div class="text-center">
                    <img th:src="@{/images/zyncky_icon_transparent.png}" class="w-25" alt="iShare app icon">
                </div>
                <h3 class="card-title text-center text-secondary">Login</h3>
                <h6 class="card-subtitle text-muted my-1 text-center">Enter your User credentials</h6>
    
                <form th:action="@{/global/login}" method="POST" class="" onsubmit="return validateSignInFormData()">
                    <div class="form-floating mb-3">
                        <input type="text" class="form-control" id="username" name="username" placeholder="Eg: sureshkumar.a" autofocus
                            autocomplete="new-username" formControlName="username">
                        <label for="username">Username</label>
                        <div class="invalid-tooltip">
                            Please enter a unique and valid username without space
                        </div>
                    </div>
                    <div class="form-floating mb-3">
                        <input type="password" class="form-control" formControlName="password" id="password" name="password" placeholder="password"
                            autocomplete="new-password">
                        <label for="password">Password</label>
                        <div class="form-check font-monospace">
                            <input class="form-check-input" type="checkbox" value="" id="showPassword" onclick="tooglePassword()">
                            <label class="form-check-label" for="showPassword">
                                Show password
                            </label>
                        </div>
                        <div class="invalid-tooltip">
                            Please enter a unique and valid Password containing at least one numeric digit,
                            one uppercase and one lowercase letter
                        </div>
                    </div>

                    <div class="d-grid">
                        <button class="btn btn-primary font-monospace fw-bold text-uppercase" type="submit">Login</button>
                    </div>
                </form>
                <hr>
                <h6 class="class-text mb-2">Not a member? <a th:href="@{/global/create-account}" class="card-link">
                    Create Account</a>
                </h6>
            </div>
        </div>
    </div>

    <body th:replace="fragments/global :: js"></body>
    <script th:src="@{/js/login.js}"></script>
</body>

</html>
