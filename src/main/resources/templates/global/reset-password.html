<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
    <head th:replace="fragments/general :: css"></head>
</head>

<body class="cs-bg">
    <div class="d-flex justify-content-center align-items-center custom-full-height">
        <!-- Reset Password Form Card | Start -->
        <div class="card" style="max-width: 25rem;">
            <div class="card-body">
                <div class="text-center position-absolute top-0 start-50 translate-middle">
                    <img src="/images/icon.png" class="w-50" alt="library app logo">
                </div>
                <h5 class="card-title text-center cs-mt-5">Reset password</h5>
                <h6 class="card-subtitle text-muted my-1 text-center">Enter your account email address or username.</h6>
                <form action="#" method="POST" class="mt-3 row">
                    <div class="col-12 mb-3">
                        <div class="form-floating">
                            <input type="text" class="form-control" id="username-or-email-id"
                                placeholder="Eg: suresh_kumar_a" name="username-or-email-id" autofocus>
                            <label class="h6 card-subtitle" for="username-or-email-id">Username / Email-Id</label>
                        </div>
                    </div>
                    <div class="d-grid">
                        <button class="btn cs-btn-sign-in font-monospace fw-bold text-uppercase" 
                        type="button" onclick="validateData()">Reset Password</button>
                    </div>
                </form>
                <hr>
                <div class="d-grid">
                    <a href="/global/login" class="btn btn-outline-secondary font-monospace fw-bold text-uppercase">Return to Sign In</a>
                </div>
            </div>
        </div>
        <!-- Reset Password Form Card | End -->
    </div>

    <body th:replace="fragments/general :: js"></body>

    <script>
        function validateData() {
            // disableRegisterButton()
            var userNameOrEmailId = document.getElementById("username-or-email-id");
            userNameOrEmailId.classList.remove("is-valid", "is-invalid");

            if (validateUsername(userNameOrEmailId.value) || validateEmail(userNameOrEmailId.value))
                userNameOrEmailId.classList.add("is-valid")
            else {
                userNameOrEmailId.classList.add("is-invalid")
                showRegisterButton()
                return;
            }

            // Continue with Reset Password
            var user = {};
            user.key = userNameOrEmailId.value;

            const postRequestOptions = {
                method: 'POST',
                headers: new Headers({ 'content-type': 'application/json' }),
                body: JSON.stringify(user)
            };
            fetch(apiServerUrl + "/global/reset-password", postRequestOptions)
                .then(response => response.json())
                .then((data) => {
                    console.log(data);
                    showTopSuccessNotificationWithMessage("Password Reset email sent with instructions")
                })
                .catch(() => {
                    showTopErrorNotificationWithMessage("Unable to reset password. Try again")
                })
        }
   
    </script>
</body>

</html>
